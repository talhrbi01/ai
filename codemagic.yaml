workflows:
  mashhad-ios-free:
    name: Mashhad iOS unsigned IPA
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    scripts:
      - name: Build unsigned device archive
        script: |
          set -euo pipefail
          rm -rf build
          xcodebuild \
            -project Mashhad.xcodeproj \
            -scheme Mashhad \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/Mashhad.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

          app_path="$(find build/Mashhad.xcarchive/Products/Applications -maxdepth 1 -type d -name '*.app' -print -quit)"
          test -n "$app_path"
          mkdir -p build/Payload
          cp -R "$app_path" build/Payload/Mashhad.app
          (cd build && /usr/bin/zip -qry Mashhad-unsigned.ipa Payload)
          /usr/bin/unzip -l build/Mashhad-unsigned.ipa | head -n 12
    artifacts:
      - build/Mashhad-unsigned.ipa
